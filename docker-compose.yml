services:
  db:
    image: postgres:15-alpine
    container_name: homedesign_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: homedesign
    ports:
      - "5433:5432"
    volumes:
      - homedesign_db_data:/var/lib/postgresql/data

volumes:
  homedesign_db_data:
